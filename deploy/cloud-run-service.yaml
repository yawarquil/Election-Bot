# Declarative Cloud Run service descriptor for the Election Guide Assistant.
# Apply with:
#   gcloud run services replace deploy/cloud-run-service.yaml \
#     --region=asia-south1 --project=election-495213
#
# This file codifies the runtime configuration that would otherwise live
# only in ad-hoc CLI flags, making the deployment reviewable and repeatable.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: election-guide-assistant
  labels:
    app: election-guide-assistant
    component: web
    runtime: nextjs
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/description: >-
      Non-partisan, accessibility-first civic companion that walks voters
      through registration, the election timeline, and polling-day reality.
spec:
  template:
    metadata:
      labels:
        app: election-guide-assistant
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "4"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 30
      containers:
        - name: web
          image: asia-south1-docker.pkg.dev/election-495213/election-guide-assistant/election-guide-assistant:latest
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: GOOGLE_CLOUD_REGION
              value: asia-south1
            - name: GOOGLE_CLOUD_PROJECT
              value: election-495213
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
  traffic:
    - percent: 100
      latestRevision: true
